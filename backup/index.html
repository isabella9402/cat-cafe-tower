<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#000000" />
  <title>Cat Café Tower · 캣 카페 타워</title>

  <!-- Korean-friendly cute fonts (graceful fallback to system Hangul offline) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Jua&family=Do+Hyeon&family=Black+Han+Sans&family=Poor+Story&family=Gamja+Flower&family=Dongle:wght@300;400;700&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">

  <!-- Primary game font: Memoment Kkukkukk (local) -->
  <link rel="preload" href="font/kkukkukk/MemomentKkukkukk.ttf" as="font" type="font/ttf" crossorigin="anonymous">

  <style>
    @font-face {
      font-family: 'Kkukkukk';
      src: url('font/kkukkukk/MemomentKkukkukk.ttf') format('truetype');
      font-weight: normal; font-style: normal; font-display: swap;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
      background: #000000;                 /* pure black letterbox area */
      font-family: "Jua", "Malgun Gothic", sans-serif;
      -webkit-tap-highlight-color: transparent;
      touch-action: none; user-select: none;
    }
    /* Flexbox is the SINGLE source of centering (Phaser autoCenter is set to
       NO_CENTER in main.js — using both flex + CENTER_BOTH double-offsets the
       canvas to the right on wide windows). */
    #game {
      position: fixed; inset: 0;
      width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: #000000;
    }
    canvas { display: block; }
    /* Subtle pink glow so the canvas stands out on black. */
    #game canvas {
      display: block;
      box-shadow: 0 0 40px rgba(255, 182, 193, 0.15),
                  0 10px 30px rgba(0, 0, 0, 0.5);
      border-radius: 8px;
    }
    /* True portrait phones (narrower than 9:16): fill edge-to-edge, no frame. */
    @media (max-aspect-ratio: 9/16) {
      #game canvas { box-shadow: none; border-radius: 0; }
    }
    #loading {
      position: fixed; inset: 0; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      background: #000000; color: #FFB6C1; font-size: 22px;
    }
  </style>
</head>
<body>
  <div id="game"></div>
  <div id="loading">불러오는 중...</div>

  <!-- Phaser 3 from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>

  <!-- Game code (classic scripts, loaded in dependency order so it runs on file:// too) -->
  <script src="src/config/constants.js"></script>
  <script src="src/config/assetMap.js"></script>
  <script src="src/config/helpers.js"></script>
  <script src="src/config/fontStyles.js"></script>
  <script src="src/ui/TopHUD.js"></script>
  <script src="src/entities/Cat.js"></script>
  <script src="src/entities/Tower.js"></script>
  <script src="src/scenes/BootScene.js"></script>
  <script src="src/scenes/MenuScene.js"></script>
  <script src="src/scenes/GameScene.js"></script>
  <script src="src/scenes/GameOverScene.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
