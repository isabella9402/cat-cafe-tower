<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#FFE5EC" />
  <title>Cat Café Tower · 캣 카페 타워</title>

  <!-- Korean-friendly cute fonts (graceful fallback to system Hangul offline) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Jua&family=Do+Hyeon&family=Black+Han+Sans&family=Poor+Story&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    :root { --bg: #FFE5EC; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      font-family: "Jua", "Malgun Gothic", sans-serif;
      -webkit-tap-highlight-color: transparent;
      touch-action: none; user-select: none;
    }
    /* Soft sky gradient behind the letterboxed canvas — replaces the solid
       pink side-bars with a themed backdrop. */
    body {
      background: linear-gradient(135deg, #FFB6C1 0%, #FFC9DE 40%, #FFE5EC 100%);
    }
    /* Subtle radial vignette for depth. */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(ellipse at center,
                  rgba(255,255,255,0) 40%, rgba(120,60,80,0.20) 100%);
    }
    #game {
      position: relative; z-index: 1;
      width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    canvas { display: block; }
    /* On wide/tall screens the canvas floats like a phone screen. */
    #game canvas {
      box-shadow: 0 20px 60px rgba(255,105,157,0.30), 0 8px 25px rgba(255,105,157,0.20);
      border-radius: 14px;
    }
    /* True portrait phones (narrower than 9:16): fill edge-to-edge, no frame. */
    @media (max-aspect-ratio: 9/16) {
      #game canvas { box-shadow: none; border-radius: 0; }
    }
    #loading {
      position: fixed; inset: 0; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #FFB6C1 0%, #FFE5EC 100%);
      color: #5b3a29; font-size: 22px;
    }
    /* Rotate-to-portrait prompt on small landscape screens. */
    @media (orientation: landscape) and (max-width: 900px) {
      #game::after {
        content: '📱 세로로 돌려주세요\A Please rotate to portrait';
        white-space: pre; text-align: center;
        position: fixed; inset: 0; z-index: 999;
        display: flex; align-items: center; justify-content: center;
        background: rgba(255,229,236,0.96);
        font-family: "Do Hyeon", sans-serif; font-size: 24px; color: #5b3a29;
      }
    }
  </style>
</head>
<body>
  <div id="game"></div>
  <div id="loading">불러오는 중...</div>

  <!-- Phaser 3 from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>

  <!-- Game code (classic scripts, loaded in dependency order so it runs on file:// too) -->
  <script src="src/config/constants.js"></script>
  <script src="src/config/assetMap.js"></script>
  <script src="src/config/helpers.js"></script>
  <script src="src/config/fontStyles.js"></script>
  <script src="src/entities/Cat.js"></script>
  <script src="src/entities/Tower.js"></script>
  <script src="src/scenes/BootScene.js"></script>
  <script src="src/scenes/MenuScene.js"></script>
  <script src="src/scenes/GameScene.js"></script>
  <script src="src/scenes/GameOverScene.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
